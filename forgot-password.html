<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找回密码 - 元膳健康</title>
    <meta name="description" content="找回元膳健康账号密码,通过手机号验证码重置密码。">
    <meta name="robots" content="noindex,nofollow">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans SC', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .forgot-container {
            background: white;
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        }

        .logo i {
            font-size: 2.5rem;
            color: white;
        }

        .title {
            font-size: 2rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #6b7280;
            font-size: 1rem;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 2rem;
        }

        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e5e7eb;
            color: #6b7280;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .step.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .step.completed {
            background: #10b981;
            color: white;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #374151;
            font-size: 0.95rem;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .verify-group {
            display: flex;
            gap: 10px;
        }

        .verify-btn {
            white-space: nowrap;
            padding: 14px 24px;
            background: #f3f4f6;
            color: #6b7280;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 140px;
        }

        .verify-btn:hover:not(:disabled) {
            background: #e5e7eb;
        }

        .verify-btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: #6b7280;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 0.25rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .step-content {
            display: none;
        }

        .step-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .success-icon {
            text-align: center;
            margin-bottom: 2rem;
        }

        .success-icon i {
            font-size: 4rem;
            color: #10b981;
        }

        .success-text {
            text-align: center;
            color: #374151;
            font-size: 1.1rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #6b7280;
            text-decoration: none;
            margin-bottom: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <div class="header">
            <div class="logo">
                <i class="fas fa-key"></i>
            </div>
            <h1 class="title">找回密码</h1>
            <p class="subtitle">通过手机号验证重置密码</p>
        </div>

        <div class="step-indicator">
            <div class="step active" id="step1">1</div>
            <div class="step" id="step2">2</div>
            <div class="step" id="step3">3</div>
        </div>

        <!-- 步骤1: 验证手机号 -->
        <div class="step-content active" id="stepContent1">
            <form id="step1Form">
                <div class="form-group">
                    <label class="form-label">手机号 <span style="color: #ef4444;">*</span></label>
                    <input type="tel" class="form-input" id="phone" placeholder="请输入注册时的手机号" maxlength="11" required>
                    <div class="error-message" id="phoneError">请输入正确的手机号</div>
                </div>

                <div class="form-group">
                    <label class="form-label">验证码 <span style="color: #ef4444;">*</span></label>
                    <div class="verify-group">
                        <input type="text" class="form-input" id="verifyCode" placeholder="请输入验证码" maxlength="6" required>
                        <button type="button" class="verify-btn" id="sendCodeBtn">获取验证码</button>
                    </div>
                    <div class="error-message" id="codeError">验证码错误</div>
                </div>

                <button type="submit" class="submit-btn">下一步</button>
            </form>
        </div>

        <!-- 步骤2: 设置新密码 -->
        <div class="step-content" id="stepContent2">
            <a class="back-btn" onclick="goToStep(1)">
                <i class="fas fa-arrow-left"></i> 返回上一步
            </a>
            <form id="step2Form">
                <div class="form-group">
                    <label class="form-label">新密码 <span style="color: #ef4444;">*</span></label>
                    <input type="password" class="form-input" id="newPassword" placeholder="6-20位,包含字母和数字" required>
                </div>

                <div class="form-group">
                    <label class="form-label">确认新密码 <span style="color: #ef4444;">*</span></label>
                    <input type="password" class="form-input" id="confirmPassword" placeholder="请再次输入新密码" required>
                    <div class="error-message" id="passwordError">两次密码不一致</div>
                </div>

                <button type="submit" class="submit-btn">下一步</button>
            </form>
        </div>

        <!-- 步骤3: 成功提示 -->
        <div class="step-content" id="stepContent3">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <div class="success-text">
                <p style="font-size: 1.3rem; font-weight: 600; margin-bottom: 1rem;">密码重置成功!</p>
                <p>您的密码已成功更新</p>
                <p>请使用新密码登录</p>
            </div>
            <button type="button" class="submit-btn" onclick="window.close()">完成</button>
        </div>

        <div class="footer">
            记起密码了? <a href="javascript:void(0)" onclick="window.close()">立即登录</a>
        </div>
    </div>

    <script>
        let currentStep = 1;
        let userPhone = '';

        // 步骤1: 验证手机号
        const phoneInput = document.getElementById('phone');
        const phoneError = document.getElementById('phoneError');
        const sendCodeBtn = document.getElementById('sendCodeBtn');
        const verifyCodeInput = document.getElementById('verifyCode');
        const codeError = document.getElementById('codeError');

        phoneInput.addEventListener('input', function() {
            const value = this.value.replace(/\D/g, '');
            this.value = value;
            
            if (value.length === 11 && /^1[3-9]\d{9}$/.test(value)) {
                phoneError.classList.remove('show');
            }
        });

        phoneInput.addEventListener('blur', function() {
            if (this.value && !/^1[3-9]\d{9}$/.test(this.value)) {
                phoneError.classList.add('show');
            }
        });

        // 发送验证码
        let countdown = 0;

        sendCodeBtn.addEventListener('click', function() {
            const phone = phoneInput.value;
            
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                phoneError.classList.add('show');
                phoneInput.focus();
                return;
            }

            // 模拟发送验证码
            sendCodeBtn.disabled = true;
            sendCodeBtn.textContent = '发送中...';

            setTimeout(() => {
                countdown = 60;
                sendCodeBtn.textContent = `${countdown}秒后重试`;
                
                const timer = setInterval(() => {
                    countdown--;
                    if (countdown <= 0) {
                        clearInterval(timer);
                        sendCodeBtn.disabled = false;
                        sendCodeBtn.textContent = '获取验证码';
                    } else {
                        sendCodeBtn.textContent = `${countdown}秒后重试`;
                    }
                }, 1000);

                alert(`模拟验证码已发送: 123456\n(实际项目会发送到手机 ${phone})`);
            }, 1000);
        });

        document.getElementById('step1Form').addEventListener('submit', function(e) {
            e.preventDefault();

            // 验证手机号
            if (!/^1[3-9]\d{9}$/.test(phoneInput.value)) {
                phoneError.classList.add('show');
                phoneInput.focus();
                return;
            }

            // 验证验证码 (模拟验证123456)
            if (verifyCodeInput.value !== '123456') {
                codeError.classList.add('show');
                verifyCodeInput.focus();
                return;
            }

            // 检查手机号是否注册
            const users = JSON.parse(localStorage.getItem('yuanshan_registered_users') || '[]');
            const user = users.find(u => u.phone === phoneInput.value);
            
            if (!user) {
                alert('该手机号未注册,请先注册账号');
                return;
            }

            userPhone = phoneInput.value;
            goToStep(2);
        });

        verifyCodeInput.addEventListener('input', function() {
            codeError.classList.remove('show');
        });

        // 步骤2: 设置新密码
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const passwordError = document.getElementById('passwordError');

        confirmPasswordInput.addEventListener('blur', function() {
            if (this.value && this.value !== newPasswordInput.value) {
                passwordError.classList.add('show');
            } else {
                passwordError.classList.remove('show');
            }
        });

        document.getElementById('step2Form').addEventListener('submit', function(e) {
            e.preventDefault();

            // 验证密码
            if (newPasswordInput.value.length < 6) {
                alert('密码长度至少6位');
                newPasswordInput.focus();
                return;
            }

            if (newPasswordInput.value !== confirmPasswordInput.value) {
                passwordError.classList.add('show');
                confirmPasswordInput.focus();
                return;
            }

            // 更新密码
            const users = JSON.parse(localStorage.getItem('yuanshan_registered_users') || '[]');
            const userIndex = users.findIndex(u => u.phone === userPhone);
            
            if (userIndex !== -1) {
                users[userIndex].password = newPasswordInput.value;
                users[userIndex].updatedAt = new Date().toISOString();
                localStorage.setItem('yuanshan_registered_users', JSON.stringify(users));
            }

            goToStep(3);
        });

        // 步骤切换
        function goToStep(step) {
            currentStep = step;

            // 更新步骤指示器
            document.querySelectorAll('.step').forEach((el, index) => {
                el.classList.remove('active', 'completed');
                if (index + 1 < step) {
                    el.classList.add('completed');
                    el.innerHTML = '<i class="fas fa-check"></i>';
                } else if (index + 1 === step) {
                    el.classList.add('active');
                    el.textContent = step;
                } else {
                    el.textContent = index + 1;
                }
            });

            // 更新内容区域
            document.querySelectorAll('.step-content').forEach((el, index) => {
                el.classList.remove('active');
                if (index + 1 === step) {
                    el.classList.add('active');
                }
            });
        }
    </script>
</body>
</html>

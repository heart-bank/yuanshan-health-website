<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 元膳健康</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Noto Sans SC', sans-serif;
        }

        body {
            background: #f3f4f6;
            min-height: 100vh;
        }

        /* 导航栏 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.05);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo i {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-link {
            color: #374151;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-link:hover {
            color: #667eea;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 24px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .user-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
        }

        /* 主内容区 */
        .main-content {
            padding-top: 100px;
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 50px;
        }

        /* 个人资料卡片 */
        .profile-card {
            background: white;
            border-radius: 24px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.3);
        }

        .profile-info h2 {
            font-size: 2rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 0.5rem;
        }

        .profile-info p {
            color: #6b7280;
            font-size: 1rem;
        }

        .profile-actions {
            display: flex;
            gap: 1rem;
        }

        .action-btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 1rem;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .action-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
        }

        .action-btn.secondary {
            background: #f3f4f6;
            color: #374151;
        }

        .action-btn.secondary:hover {
            background: #e5e7eb;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .stat-icon.blue {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .stat-icon.green {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .stat-icon.orange {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white;
        }

        .stat-icon.purple {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            color: white;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: #6b7280;
            font-size: 0.95rem;
        }

        /* 功能菜单 */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .menu-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .menu-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
        }

        .menu-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .menu-icon {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: white;
        }

        .menu-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1f2937;
        }

        .menu-desc {
            color: #6b7280;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .menu-arrow {
            color: #9ca3af;
            font-size: 1.2rem;
        }

        /* 历史记录列表 */
        .history-section {
            background: white;
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f2937;
        }

        .section-more {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.5rem;
            background: #f9fafb;
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .history-item:hover {
            background: #f3f4f6;
        }

        .history-date {
            width: 80px;
            text-align: center;
        }

        .history-day {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f2937;
        }

        .history-month {
            color: #6b7280;
            font-size: 0.9rem;
        }

        .history-info {
            flex: 1;
        }

        .history-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 0.25rem;
        }

        .history-meta {
            color: #6b7280;
            font-size: 0.9rem;
        }

        .history-score {
            text-align: right;
        }

        .score-badge {
            display: inline-block;
            padding: 8px 16px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border-radius: 12px;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #9ca3af;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .empty-state p {
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-leaf"></i>
            <span>元膳健康</span>
        </div>
        <div class="nav-links">
            <a href="元膳健康官网首页（升级版）.html" class="nav-link">首页</a>
            <a href="AI健康膳食报告系统_pro.html" class="nav-link">健康评估</a>
            <a href="#" class="nav-link">产品</a>
            <a href="#about" class="nav-link">关于我们</a>
        </div>
        <div class="user-menu">
            <span style="color: #6b7280;">欢迎, 用户</span>
            <a href="#" class="user-btn">
                <i class="fas fa-sign-out-alt"></i> 退出登录
            </a>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="main-content">
        <!-- 个人资料卡片 -->
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="profile-info">
                    <h2 id="userName">用户</h2>
                    <p id="userPhone">手机号: 138****8888</p>
                    <p id="memberSince">加入时间: 2024-03-25</p>
                </div>
                <div class="profile-actions">
                    <button class="action-btn primary" onclick="window.location.href='AI健康膳食报告系统_pro.html'">
                        <i class="fas fa-plus"></i> 新建评估
                    </button>
                    <button class="action-btn secondary">
                        <i class="fas fa-cog"></i> 设置
                    </button>
                </div>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon blue">
                    <i class="fas fa-file-medical-alt"></i>
                </div>
                <div class="stat-value" id="reportCount">0</div>
                <div class="stat-label">健康评估报告</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="stat-value" id="avgScore">--</div>
                <div class="stat-label">平均健康分</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange">
                    <i class="fas fa-calendar-check"></i>
                </div>
                <div class="stat-value" id="dayCount">0</div>
                <div class="stat-label">使用天数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple">
                    <i class="fas fa-utensils"></i>
                </div>
                <div class="stat-value" id="mealCount">0</div>
                <div class="stat-label">推荐膳食计划</div>
            </div>
        </div>

        <!-- 功能菜单 -->
        <div class="menu-grid" style="margin-bottom: 2rem;">
            <div class="menu-card" onclick="window.location.href='AI健康膳食报告系统_pro.html'">
                <div class="menu-header">
                    <div class="menu-icon" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                        <i class="fas fa-heartbeat"></i>
                    </div>
                    <div class="menu-title">健康评估</div>
                </div>
                <p class="menu-desc">开始新的健康评估,获取个性化的膳食建议</p>
                <div style="text-align: right; margin-top: 1rem;">
                    <i class="fas fa-chevron-right menu-arrow"></i>
                </div>
            </div>

            <div class="menu-card">
                <div class="menu-header">
                    <div class="menu-icon" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
                        <i class="fas fa-history"></i>
                    </div>
                    <div class="menu-title">历史记录</div>
                </div>
                <p class="menu-desc">查看所有历史评估报告,追踪健康变化</p>
                <div style="text-align: right; margin-top: 1rem;">
                    <i class="fas fa-chevron-right menu-arrow"></i>
                </div>
            </div>

            <div class="menu-card">
                <div class="menu-header">
                    <div class="menu-icon" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="menu-title">AI咨询</div>
                </div>
                <p class="menu-desc">与AI健康助手对话,获取专业建议</p>
                <div style="text-align: right; margin-top: 1rem;">
                    <i class="fas fa-chevron-right menu-arrow"></i>
                </div>
            </div>

            <div class="menu-card">
                <div class="menu-header">
                    <div class="menu-icon" style="background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);">
                        <i class="fas fa-book-open"></i>
                    </div>
                    <div class="menu-title">膳食计划</div>
                </div>
                <p class="menu-desc">管理您的个性化膳食计划</p>
                <div style="text-align: right; margin-top: 1rem;">
                    <i class="fas fa-chevron-right menu-arrow"></i>
                </div>
            </div>
        </div>

        <!-- 历史记录 -->
        <div class="history-section">
            <div class="section-header">
                <h3 class="section-title">最近评估</h3>
                <a href="#" class="section-more">查看全部 <i class="fas fa-chevron-right"></i></a>
            </div>
            <div class="history-list" id="historyList">
                <!-- 历史记录将通过JS动态加载 -->
            </div>
        </div>
    </div>

    <script>
        // 加载用户数据
        function loadUserData() {
            // 获取当前登录用户（模拟）
            const currentUser = JSON.parse(localStorage.getItem('yuanshan_current_user') || '{}');
            
            if (currentUser.phone) {
                document.getElementById('userName').textContent = '用户';
                document.getElementById('userPhone').textContent = `手机号: ${currentUser.phone.substring(0, 3)}****${currentUser.phone.substring(7)}`;
                
                if (currentUser.createdAt) {
                    const date = new Date(currentUser.createdAt);
                    document.getElementById('memberSince').textContent = `加入时间: ${date.getFullYear()}-${(date.getMonth() + 1).toString().padStart(2, '0')}-${date.getDate().toString().padStart(2, '0')}`;
                }
            }

            // 获取用户历史报告
            const reports = JSON.parse(localStorage.getItem('yuanshan_users') || '[]');
            
            // 过滤当前用户的报告（通过手机号或其他标识）
            // 这里模拟显示所有报告
            const userReports = reports.filter(r => r.id); // 实际应该根据用户ID过滤
            
            // 更新统计数据
            document.getElementById('reportCount').textContent = userReports.length;
            
            if (userReports.length > 0) {
                const avgScore = userReports.reduce((sum, r) => sum + (r.score || 85), 0) / userReports.length;
                document.getElementById('avgScore').textContent = avgScore.toFixed(0);
                document.getElementById('mealCount').textContent = userReports.length * 7; // 每个报告7天计划
            }

            // 计算使用天数
            if (currentUser.createdAt) {
                const joinDate = new Date(currentUser.createdAt);
                const today = new Date();
                const diffTime = Math.abs(today - joinDate);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                document.getElementById('dayCount').textContent = diffDays;
            }

            // 加载历史记录
            loadHistoryList(userReports);
        }

        // 加载历史记录列表
        function loadHistoryList(reports) {
            const historyList = document.getElementById('historyList');
            
            if (reports.length === 0) {
                historyList.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <p>暂无评估记录</p>
                        <p style="margin-top: 0.5rem; font-size: 0.9rem;">开始您的第一次健康评估吧</p>
                    </div>
                `;
                return;
            }

            // 按时间倒序排列,取最近5条
            const sortedReports = reports
                .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
                .slice(0, 5);

            historyList.innerHTML = sortedReports.map(report => {
                const date = new Date(report.createdAt);
                const day = date.getDate();
                const month = (date.getMonth() + 1).toString().padStart(2, '0') + '月';
                
                const constitutionLabels = [
                    '平和质', '气虚质', '阳虚质', '阴虚质', '痰湿质',
                    '湿热质', '血瘀质', '气郁质', '特禀质'
                ];
                const constitution = constitutionLabels[report.constitution] || '平和质';

                return `
                    <div class="history-item">
                        <div class="history-date">
                            <div class="history-day">${day}</div>
                            <div class="history-month">${month}</div>
                        </div>
                        <div class="history-info">
                            <div class="history-title">健康评估报告</div>
                            <div class="history-meta">
                                <span><i class="fas fa-dna"></i> ${constitution}</span>
                                <span style="margin: 0 1rem;"><i class="fas fa-weight"></i> BMI: ${report.bmi || '--'}</span>
                                <span><i class="fas fa-bullseye"></i> 目标: ${report.goal || '保持健康'}</span>
                            </div>
                        </div>
                        <div class="history-score">
                            <div class="score-badge">${report.score || 85}分</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', loadUserData);
    </script>
</body>
</html>
